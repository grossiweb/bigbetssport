# Big Ball Sports — Redis 7 configuration
# Mounted read-only into the redis container at /usr/local/etc/redis/redis.conf

# Network
bind 0.0.0.0
protected-mode no
port 6379
tcp-keepalive 300

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence — AOF + RDB snapshots
appendonly yes
appendfsync everysec
save 900 1
save 300 10

# Background tasks
hz 20

# Logging
loglevel notice

# Clients
timeout 0
