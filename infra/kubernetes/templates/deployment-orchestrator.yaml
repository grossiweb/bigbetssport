apiVersion: apps/v1
kind: Deployment
metadata:
  name: bbs-orchestrator
  labels:
    app: bbs-orchestrator
spec:
  replicas: {{ .Values.orchestrator.replicaCount }}
  selector:
    matchLabels:
      app: bbs-orchestrator
  template:
    metadata:
      labels:
        app: bbs-orchestrator
    spec:
      containers:
        - name: orchestrator
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}/orchestrator:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.orchestrator.env.ORCHESTRATOR_PORT | default "3006" }}
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: ORCHESTRATOR_PORT
              value: "{{ .Values.orchestrator.env.ORCHESTRATOR_PORT | default "3006" }}"
            - name: LOG_LEVEL
              value: {{ .Values.orchestrator.env.LOG_LEVEL | default "info" }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: REDIS_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: DATABASE_URL
          envFrom:
            - secretRef:
                name: {{ .Values.secretName }}
          resources:
{{ toYaml .Values.orchestrator.resources | indent 12 }}
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bbs-orchestrator
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      name: http
  selector:
    app: bbs-orchestrator
