apiVersion: apps/v1
kind: Deployment
metadata:
  name: bbs-gateway
  labels:
    app: bbs-gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app: bbs-gateway
  template:
    metadata:
      labels:
        app: bbs-gateway
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}/gateway:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.gateway.env.GATEWAY_PORT | default "3000" }}
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: GATEWAY_PORT
              value: "{{ .Values.gateway.env.GATEWAY_PORT | default "3000" }}"
            - name: LOG_LEVEL
              value: {{ .Values.gateway.env.LOG_LEVEL | default "info" }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: REDIS_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: DATABASE_URL
            - name: API_KEY_HASH_SALT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: API_KEY_HASH_SALT
            - name: ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: ADMIN_KEY
          resources:
{{ toYaml .Values.gateway.resources | indent 12 }}
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bbs-gateway
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      name: http
  selector:
    app: bbs-gateway
