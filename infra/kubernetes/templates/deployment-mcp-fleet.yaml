# One Deployment per MCP scraper. The loop is driven by
# `mcpFleet.scrapers` in values.yaml.
{{- range .Values.mcpFleet.scrapers }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bbs-{{ .id }}
  labels:
    app: bbs-mcp
    scraper: {{ .id }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bbs-mcp
      scraper: {{ .id }}
  template:
    metadata:
      labels:
        app: bbs-mcp
        scraper: {{ .id }}
    spec:
      containers:
        - name: scraper
          image: "{{ $.Values.image.registry }}/{{ $.Values.image.repository }}/mcp-fleet:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .port }}
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: SCRAPER_ID
              value: {{ .id }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secretName }}
                  key: REDIS_URL
          envFrom:
            - secretRef:
                name: {{ $.Values.secretName }}
          resources:
{{ toYaml $.Values.mcpFleet.resources | indent 12 }}
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: bbs-{{ .id }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      name: http
  selector:
    app: bbs-mcp
    scraper: {{ .id }}
{{- end }}
